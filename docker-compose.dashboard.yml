# Optional: Traefik Dashboard with Basic Auth
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dashboard.yml up -d
#
# Generate the auth hash:
#   htpasswd -nb admin yourpassword | sed -e s/\\$/\\$\\$/g
# Paste the result into .env as TRAEFIK_DASHBOARD_AUTH

services:
  traefik:
    labels:
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN:-traefik.pr.mydomain.com}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
