# Base infrastructure: Caddy (reverse proxy)
#
# This compose file runs permanently on the VPS.
# PR environments are launched separately by the CI/CD pipeline.
#
# Prerequisites:
#   1. docker network create caddy --ipv6
#   2. .env file with CLOUDFLARE_API_TOKEN
#   3. DNS: *.pr.mydomain.com → A record pointing to this VPS IP

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: caddy
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
      - CADDY_DOCKER_POLLING_INTERVAL=5s
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - caddy_config:/config
    labels:
      # Global ACME DNS challenge via Cloudflare — all sites share this
      caddy.acme_dns: "cloudflare {env.CLOUDFLARE_API_TOKEN}"
    restart: unless-stopped

networks:
  caddy:
    external: true

volumes:
  caddy_data: {}
  caddy_config: {}
