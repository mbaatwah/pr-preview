# Base infrastructure: Traefik (reverse proxy)
#
# This compose file runs permanently on the VPS.
# PR environments are launched separately by the CI/CD pipeline.
#
# Prerequisites:
#   1. docker network create traefik --ipv6
#   2. .env file with CLOUDFLARE_API_TOKEN and TRAEFIK_ACME_EMAIL
#   3. DNS: *.pr.mydomain.com → A record pointing to this VPS IP

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    environment:
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    networks:
      - traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    restart: unless-stopped

networks:
  traefik:
    external: true

volumes:
  traefik-certs: {}
