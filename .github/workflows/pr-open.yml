name: PR Preview — Spin Up

on:
  pull_request:
    types: [opened, synchronize]

# ⚠️ NOTE: This workflow does not declare a concurrency group. Multiple rapid
# pushes to the same PR can cause overlapping runs that interfere with each
# other because they share the same COMPOSE_PROJECT name. Consider adding:
#
# concurrency:
#   group: pr-preview-${{ github.event.pull_request.number }}
#   cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
  COMPOSE_PROJECT: pr-${{ github.event.pull_request.number }}

jobs:
  deploy-preview:
    runs-on: self-hosted
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          # Explicitly check out the PR head so the compose file and
          # Dockerfiles come from the PR branch, not the base branch.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build Docker images
        run: |
          set -euo pipefail

          echo "Building Rails image (tag: ${{ env.IMAGE_TAG }})..."
          docker build -t rails-app:${{ env.IMAGE_TAG }} -f Dockerfile.rails .

          echo "Building Vite image (tag: ${{ env.IMAGE_TAG }})..."
          docker build -t vite-app:${{ env.IMAGE_TAG }} -f Dockerfile.vite .

      - name: Select compose file
        id: compose
        run: |
          if [ -f "${GITHUB_WORKSPACE}/docker-compose.pr.yml" ]; then
            echo "file=${GITHUB_WORKSPACE}/docker-compose.pr.yml" >> "$GITHUB_OUTPUT"
            echo "Using app repo compose file."
          else
            echo "file=/opt/pr-preview/docker-compose.pr.yml" >> "$GITHUB_OUTPUT"
            echo "Using infra repo fallback compose file."
          fi

      # ⚠️ NOTE: The old environment is destroyed before the new one is built.
      # If the build or db:prepare fails, the PR will have no working preview.
      # For critical apps, consider a blue-green deployment approach.
      - name: Tear down previous PR containers
        run: |
          docker compose \
            -f "${{ steps.compose.outputs.file }}" \
            -p "${{ env.COMPOSE_PROJECT }}" \
            down -v 2>/dev/null || true

      - name: Spin up PR containers
        run: |
          PR_NUMBER="${{ env.PR_NUMBER }}" \
          IMAGE_TAG="${{ env.IMAGE_TAG }}" \
          RAILS_IMAGE=rails-app \
          VITE_IMAGE=vite-app \
          docker compose \
            -f "${{ steps.compose.outputs.file }}" \
            -p "${{ env.COMPOSE_PROJECT }}" \
            up -d

      # NOTE: This step hardcodes the container name `rails-pr-<number>`.
      # The Rails service in docker-compose.pr.yml MUST be named `rails` and
      # MUST use the container_name pattern `rails-pr-${PR_NUMBER}`.
      - name: Prepare database
        run: |
          docker exec "rails-pr-${{ env.PR_NUMBER }}" bin/rails db:prepare

      - name: Report preview URL
        run: |
          echo "=== PR #${{ env.PR_NUMBER }} live at https://pr-${{ env.PR_NUMBER }}.pr.mydomain.com ==="
