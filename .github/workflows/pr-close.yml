name: PR Preview — Tear Down

on:
  pull_request:
    types: [closed]

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}
  COMPOSE_PROJECT: pr-${{ github.event.pull_request.number }}

jobs:
  destroy-preview:
    runs-on: self-hosted
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select compose file
        id: compose
        run: |
          if [ -f "${GITHUB_WORKSPACE}/docker-compose.pr.yml" ]; then
            echo "file=${GITHUB_WORKSPACE}/docker-compose.pr.yml" >> "$GITHUB_OUTPUT"
          else
            echo "file=/opt/pr-preview/docker-compose.pr.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Tear down PR environment
        run: |
          docker compose \
            -f "${{ steps.compose.outputs.file }}" \
            -p "${{ env.COMPOSE_PROJECT }}" \
            down -v

      - name: Clean up images
        run: |
          # Tags are formatted as pr-<number>-<40-char-sha>; anchor the regex
          # to avoid false positives (e.g. PR 1 matching inside PR 10).
          docker images --format '{{.Repository}}:{{.Tag}}' | \
            grep -E ":pr-${{ env.PR_NUMBER }}-[a-f0-9]{40}$" | \
            xargs -r docker rmi 2>/dev/null || true

      - name: Report teardown
        run: |
          echo "=== PR #${{ env.PR_NUMBER }} environment destroyed ==="
